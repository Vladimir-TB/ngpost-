# ngPost-configuratiebestand
#
#

## Taal voor de app. Momenteel ondersteund: EN, DE, NL
lang = NL

## UI theme mode override (optional: LIGHT, default startup is DARK)
#THEME_MODE = LIGHT

## UI themakleur (hex, bv. #1E90FF)
#THEME_COLOR = #1E90FF

## gebruik Proxy (alleen Socks5-type!)
#PROXY_SOCKS5 = user:pass@192.168.1.1:5555

## bestemmingsmap voor al je nzb bestanden
## als je niets instelt, wordt het nzb opgeslagen in de map van ngPost op Windows en in / tmp op Linux
## dit wordt overschreven als je de optie -o gebruikt met het volledige pad van de nzb
nzbPath  = 

## Afsluitopdracht om de computer uit te schakelen wanneer ngPost klaar is met al zijn berichten in de wachtrij
## dit moet voornamelijk worden gebruikt bij het automatisch posten
## je zou in plaats daarvan elk script kunnen gebruiken (zoals een mail sturen ...)
#SHUTDOWN_CMD = shutdown /s /f /t 0  (Windows)
#SHUTDOWN_CMD = sudo -n / sbin / poweroff  (Linux, zorg ervoor dat poweroff sudo-rechten heeft zonder wachtwoord of wijzigt de opdracht)
#SHUTDOWN_CMD = sudo -n shutdown -h now (MacOS, zorgt er ook voor dat je sudo-rechten hebt)
SHUTDOWN_CMD = shutdown /s /f /t 0

## upload de nzb naar een specifieke URL
## alleen http, https of ftp (ftps of sftp worden niet ondersteund)
#NZB_UPLOAD_URL = ftp:// user: pass@url_or_ip:21

## voer een commando of script uit aan het einde van elk bericht (zie voorbeelden)
## je kunt verschillende post-commando's gebruiken door verschillende NZB_POST_CMD te definiëren
## hier is de lijst met beschikbare tijdelijke aanduidingen
##   __nzbPath__          : volledig pad van het geschreven nzb-bestand
##   __nzbName__          : naam van de nzb zonder de extensie (originele bronnaam)
##   __rarName__          : aam van de archiefbestanden (in geval van versleuteling)
##   __rarPass__          : rar wachtwoord
##   __sizeInByte__       : aam van de archiefbestanden (in geval van versleuteling)
##   __groups__           : lijst met groepen (gescheiden door komma's)
##   __nbFiles__          : aantal bestanden in de post
##   __nbArticles__       : aantal artikelen
##   __nbArticlesFailed__ : aantal artikelen dat niet is geplaatst
#
#NZB_POST_CMD = scp "__nzbPath__" myBox.com:~/nzbs/
#NZB_POST_CMD = zip "__nzbPath__.zip" "__nzbPath__"
#NZB_POST_CMD = ~/scripts/postNZB.sh "__nzbPath__" "__groups__" __rarName__ __rarPass__ __sizeInByte__ __nbFiles__ __nbArticles__ __nbArticlesFailed__
#NZB_POST_CMD = mysql -h localhost -D myDB -u myUser -pmyPass-e "INSERT INTO POST (release, rarName, rarPass, size) VALUES('__nzbName__', '__rarName__', '__rarPass__', '__sizeInByte__')"
#NZB_POST_CMD = cmd.exe /C move "__nzbPath__" "C:\ngPost\nzb\__nzbName__{{__rarPass__}}.nzb"
#NZB_POST_CMD = curl -X POST -F "file=@__nzbPath__" -F "api=12345" -F "cat=45" -F "private=no" https://usenet.com/post-api

## nzb-bestanden worden normaal gesproken allemaal gemaakt in het nzb pad
## maar met deze optie wordt de nzb van elke gemonitorde map  opgeslagen in hun eigen map (gemaakt in nzbPath)
#MONITOR_NZB_FOLDERS = true

##  extensie filter voor monitoring van  nieuwe inkomende bestanden (komma  gescheiden, geen punt)
#MONITOR_EXTENSIONS = mkv,mp4,avi,zip,tar,gz,iso

## negeer nieuwe inkomende mappen voor monitoring
#MONITOR_IGNORE_DIR = true
## for monitoring, delay to check the size of an incoming file/folder to make sure it is fully arrived before posting it
## must be between 1sec and 120sec (otherwise default: 1sec)
MONITOR_SEC_DELAY_SCAN = 1


## Standaardmap die geopend wordt om bestanden te selecteren
inputDir = /tmp

## Historie logboek
## elke succesvolle post zal een regel toevoegen met de datum, de bestandsnaam, de archiefnaam, het wachtwoord ...
POST_HISTORY = /nzb/ngPost_history.csv

## Teken dat wordt gebruikt om velden in het posting logbestand te scheiden
#FIELD_SEPARATOR = ;

GROUPS   = alt.binaries.test,alt.binaries.misc

## Als je meerdere groepen opgeeft (gescheiden door komma's), heb je 3 beleidsregels om te posten:
## ALL: alles wordt gepost op ALLE groepen
## EACH_POST: elk bericht wordt op een willekeurige groep uit de lijst geplaatst
## EACH_FILE: elk bestand wordt op een willekeurige groep uit de lijst geplaatst
GROUP_POLICY = EACH_POST

## verwijder de volgende regel om de bestandsnamen van elke rar te verdoezelen
## als je het zo laat, genereren we EEN willekeurige e-mail voor alle berichten van de sessie
#FROM = wcRP5bAU9obM9@ngPost.com

## Genereer een nieuwe willekeurige poster voor elke post (--auto of --monitor)
## als deze optie is ingesteld, wordt het VAN-e-mailadres net hierboven genegeerd
GEN_FROM = true


## verwijder commentaar op de volgende regel om het aantal threads te beperken (standaard wordt het aantal cores gebruikt)
## alle verbindingen zijn gelijk verdeeld over de threads  die posten
thread  =  32


## Hoe de voortgangsbalk op de opdrachtregel weer te geven: GEEN, BAR, BESTANDEN
DISP_Progress = BAR
#DISP_Progress = FILES


## achtervoegsel van de msg_id voor alle artikelen (cf nzb-bestand)
#msg_id  =  ngPost

## artikelgrootte (standaard 700k)
article_size = 716800

## aantal nieuwe pogingen om een ??artikel te posten in het geval van een fout (waarschijnlijk vanwege een reeds bestaand msg-id)
retry = 5


## verwijder de volgende regel om de onderwerpen van elk artikel te versleutelen
## /! \ VOORZICHTIG je zult je post niet terug vinden als je het nzb-bestand kwijtraakt/! \
#obfuscate = article

## verwijder accenten en speciale tekens uit de nzb-bestandsnamen
NZB_RM_ACCENTS = true

## Sluit Quick Post-tabbladen wanneer ze met succes zijn gepost (voor de GUI)
#AUTO_CLOSE_TABS = true


## Tijd om te wachten (seconden) voordat u probeert een bericht automatisch te hervatten in geval van verlies van netwerk (min: 30)
RESUME_WAIT = 30

## Standaard probeert ngPost een post te hervatten als het netwerk niet beschikbaar is.
##net zolang totdat het netwerk terug is en het bericht correct is voltooid
## u kunt deze functie uitschakelen en dus een post stoppen wanneer u het netwerk verliest
#NO_RESUME_AUTO = true

## als er geen activiteit is op een verbinding, wordt deze gesloten en opnieuw opgestart
## De duur  in seconden, standaard: 30, min: 5)
SOCK_TIMEOUT = 30

## wanneer meerdere berichten in de wachtrij staan, bereidt je het inpakken van de volgende post voor terwijl je de huidige uploadt
PREPARE_PACKING = true

## ALLEEN voor GUI, sla de logs op in een bestand (om mogelijke crashes te debuggen)
## ~/ngPost.log op Linux en MacOS, in de uitvoerbare map voor Windows
## Het logboek wordt elke keer dat ngPost wordt gestart overschreven
## => SAVE na een crash het logboek voordat je ngPost opnieuw start
LOG_IN_FILE = true




##############################################################
##           Compression and par2 section                   ##
##############################################################

## Snelkoppeling voor automatisch inpakken voor zowel GUI als CMD met --pack
## door coma gescheiden lijst met de trefwoorden COMPRESS, GEN_NAME, GEN_PASS en GEN_PAR2
## Voor automatisch posten en monitoren als je COMPRESS niet gebruikt, heb je GEN_PA2 nodig
#PACK = COMPRESS, GEN_NAME, GEN_PASS, GEN_PAR2
#PACK = GEN_PAR2

## gebruik hetzelfde wachtwoord voor alle rar bestanden die je gaat posten
#RAR_PASS = yourPassword

## tijdelijke map waar de rar en par2 bestanden zullen worden opgeslagen
## zodat we direct een gecomprimeerd (met wachtwoord of niet) archief van de geselecteerde bestanden kunnen plaatsen
## /! \ De map MOET SCHRIJFrechten hebben /! \
## dit is ingesteld voor Linux-omgeving, Windows-gebruikers MOETEN dit wijzigen
TMP_DIR = /tmp

## tijdelijke map met groottebeperking, meestal een tmpfs-partitie
## de grootte van een bericht moet vermenigvuldigd worden met TMP_RAM_RATIO op de schijf
## anders gebruikt ngPost TMP_DIR (zonder controle)
## (verwijder commentaar en definieer TMP_RAM om de functie te activeren, zorg ervoor dat het pad schrijfbaar is)
#TMP_RAM = /mnt/ngPost_tmpfs

## Ratio gebruikt voor de grootte van de bronbestanden om de par2-generatie te compenseren
## min is 10% om zeker te zijn (dus 1.1), max 2.0
TMP_RAM_RATIO = 1.1

## RAR of 7zip absoluut bestandspad (externe applicatie)
## /! \ Het bestand MOET BESTAAN en UITVOERBAAR zijn /! \
## ngPost first looks next to ngPost.exe for 7za, 7zz, 7zr, 7z or rar
## leave this empty to use the bundled archiver automatically
RAR_PATH = 

## RAR EXTRA opties (de eerste 'a' en '-idp' worden automatisch toegevoegd)
## -hp wordt toegevoegd als u een wachtwoord gebruikt met --gen_pass, --rar_pass of met behulp van de HMI
## -v42m wordt toegevoegd met --rar_grootte of met behulp van de HMI
## u kunt het compressieniveau wijzigen, het archief vergrendelen, redundantie toevoegen ...
#RAR_EXTRA = -ep1 -m0 -k -rr5p
#RAR_EXTRA = -mx0 -mhe=on   (for 7-zip)

## grootte in MB van de RAR-volumes (0 betekent standaard GEEN splitsing)
## voel je vrij om de waarde te veranderen of om commentaar te geven op de volgende regel als je het archief niet wilt splitsen
RAR_SIZE = 42

## maximum aantal archiefvolumes
## we gebruiken de RAR_Grootte, behalve als het te veel volumes genereert
## in dat geval updaten we rar_size naar <size of post> / rar_max
RAR_MAX = 99

## rar map behouden na het posten (anders wordt het automatisch verwijderd bij een succesvolle post)
#KEEP_RAR = true

## Verwijder de root (bovenliggende) map bij het comprimeren van mappen met RAR
#RAR_NO_ROOT_FOLDER = true

## par2 redundantiepercentage (0 betekent standaard GEEN par2 generatie)
PAR2_PCT = 8

## par2 (of alternatief) absoluut bestandspad
## dit is alleen handig als je compileert vanaf de bron (zoals par2 is opgenomen in Windows en de AppImage)
## of als je een alternatief voor par2 wilt gebruiken (bijvoorbeeld Multipar op Windows)
## (in dat geval moet je mogelijk ook PAR2_ARGS instellen)
#PAR2_PATH = <your_path>parpar.exe
#PAR2_PATH = <your_path>par2j64.exe

## vaste parameters voor de par2 (of alternatieve) opdracht
## je zou bijvoorbeeld Multipar op Windows kunnen gebruiken
#PAR2_ARGS = -s5M -r1n*0.6 -m2048M -p1l --progress stdout -q   (for parpar)
#PAR2_ARGS = c -l -m1024 -r8 -s768000                 (for par2cmdline)
#PAR2_ARGS = create /rr8 /lc40 /lr /rd2 /ss768000     (for Multipar)


## lengte van de willekeurig gegenereerde bestandsnaam van het archief
LENGTH_NAME = 22

## lengte van het willekeurige wachtwoord
LENGTH_PASS = 15




##############################################################
##                   servers section                        ##
##############################################################

[server]
host = news.newshosting.com
port = 443
ssl  = true
user = myUser
pass = myPass
connection = 30
enabled = true
nzbCheck = false


## Je kunt zoveel servers hebben als je wilt en  meerdere providers toevoegen door andere "server" secties toe te voegen
#[server]
#host = news.otherprovider.com
#port = 563
#ssl  = true
#user = myOtherUser
#pass = myOtherPass
#connection = 15
#enabled = false
#nzbCheck = false

